<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CampusFinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">CampusFinder</h1>

        <form id="login-form" class="auth-form">
          <h2>Welcome Back</h2>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              required
              placeholder="student@kiet.edu"
            />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="submit-btn">Log In</button>
          <p class="auth-switch">
            New here? <span id="show-register">Create an account</span>
          </p>
        </form>

        <form id="register-form" class="auth-form hidden">
          <h2>Create Account</h2>
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" required placeholder="Your Name" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              required
              placeholder="student@kiet.edu"
            />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="submit-btn">Sign Up</button>
          <p class="auth-switch">
            Already have an account? <span id="show-login">Log in</span>
          </p>
        </form>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
